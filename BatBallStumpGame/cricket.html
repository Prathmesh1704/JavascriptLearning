<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket Game</title>
  <style>
    body{
      text-align: center;
    }

  </style>
</head>
<body>

  <h1>Bat Ball Stump Game</h1>
  <button onclick="
  
  generateComputerChoice();
 

  let resultMsg;
  if(computerChoice==='Ball'){
    resultMsg ='User won.';
  }else if(computerChoice==='Bat'){
    resultMsg= 'Game Tied';
  }else{
    resultMsg ='Computer Won';
  }

  alert(` You have Choosen Bat . Computer Choice is ${computerChoice} . ${resultMsg}`);

  ">Bat</button>

  <button onclick="
  
  generateComputerChoice();

  if(computerChoice==='Ball'){
    resultMsg ='Game Tied.';
  }else if(computerChoice==='Bat'){
    resultMsg= 'Computer Won';
  }else{
    resultMsg ='User Won';
  }

  alert(` You have Choosen Ball . Computer Choice is ${computerChoice} . ${resultMsg}`);

  "
  
  >Ball</button>


  <button onclick="
  
  generateComputerChoice();
 

  
  if(computerChoice==='Ball'){
    resultMsg ='Computer Won.';
  }else if(computerChoice==='Bat'){
    resultMsg= 'User won';
  }else{
    resultMsg ='Game Tied';
  }

  alert(` You have Choosen Stump . Computer Choice is ${computerChoice} . ${resultMsg}`);

  " 
  >Stump</button>


  <Script>
    let computerChoice;
    function generateComputerChoice(){
      let randomNumber = Math.random()*3;

      if(randomNumber >0 && randomNumber<=1){
        computerChoice ='Bat';
    
      }else if(randomNumber>1 && randomNumber <=2){
        computerChoice = 'Ball';
    
      }else{
         computerChoice = 'Stump';
    
      }
    }


  </Script>

  
</body>
</html>
