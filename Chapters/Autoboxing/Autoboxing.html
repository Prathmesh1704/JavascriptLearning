<body>

  <script>

    console.log('This is String length method'.length);
    console.log('This is String length method'.toUpperCase());
    console.log('This is PB'.replace('PB','Prathmesh Bapte'));


    /*
      What Happens Internally?
      When you write

      let str = "hello";
      console.log(str.toUpperCase());

      JavaScript internally does something similar to:

      let temp = new String("hello");
      console.log(temp.toUpperCase());

      After executing the method,

      temp object is destroyed
    This automatic conversion is called Autoboxing.
          
    */



  </script>
  
</body>
