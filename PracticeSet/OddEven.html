<body>

  <script>

    function isOddEven(num){

      let rem = num%2;
      if(rem===1){
        return 'Odd'; 
      }
      return 'Even';
    }

    let result = isOddEven(16);
    console.log(`Answer is ${result}`);

  </script>
  
</body>
